<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>白板</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }
        /* 背景图 */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
        /* 评论区 */
        .comment-area {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: rgba(255,255,255,0.3);
            padding: 15px;
            border-radius: 10px;
            z-index: 10;
        }
        textarea {
            width: 100%;
            height: 60px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    < img id="bg" src="https://picsum.photos/id/237/1920/1080" alt="背景">
    <div class="comment-area">
        <textarea placeholder="写评论..."></textarea>
        <button onclick="send()">发布</button>
    </div>

    <script>
        function send() {
            const text = document.querySelector('textarea').value.trim();
            if (!text) return;
            alert('评论发布成功：' + text);
            document.querySelector('textarea').value = '';
        }
    </script>
</body>
</html>
