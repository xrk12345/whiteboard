<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属背景图片评论白板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 全屏背景图 */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background-image: url('https://imgse.com/i/pn8vX7U');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 透明评论区 */
        .comments-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 350px;
            max-height: 70vh;
            z-index: 3;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .comments-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.3);
            font-weight: 600;
            color: #fff;
            text-align: center;
        }

        .comment-input-container {
            padding: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.3);
        }

        #comment-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            font-size: 14px;
            resize: none;
            height: 60px;
            background: rgba(255, 255, 255, 0.6);
            color: #000;
        }

        #submit-comment {
            margin-top: 10px;
            width: 100%;
            background-color: #000;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .comments-list {
            flex: 1;
            padding: 10px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .comment-item {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-size: 13px;
            color: #000;
            line-height: 1.4;
        }

        .comment-time {
            font-size: 11px;
            color: #333;
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="background-container"></div>

    <div class="comments-panel">
        <div class="comments-header">评论区</div>
        <div class="comment-input-container">
            <textarea id="comment-input" placeholder="写下你的评论..."></textarea>
            <button id="submit-comment">发布评论</button>
        </div>
        <div class="comments-list" id="comments-list"></div>
    </div>

<script>
    const commentInput = document.getElementById('comment-input');
    const submitComment = document.getElementById('submit-comment');
    const commentsList = document.getElementById('comments-list');

    loadComments();
    submitComment.addEventListener('click', postComment);
    commentInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            postComment();
        }
    });

    function postComment() {
        const text = commentInput.value.trim();
        if (!text) return;
        const comment = { id: Date.now(), text, time: new Date().toLocaleString() };
        saveComment(comment);
        addCommentToDOM(comment);
        commentInput.value = '';
    }

    function saveComment(comment) {
        let comments = JSON.parse(localStorage.getItem('whiteboardComments')) || [];
        comments.push(comment);
        localStorage.setItem('whiteboardComments', JSON.stringify(comments));
    }

    function loadComments() {
        const comments = JSON.parse(localStorage.getItem('whiteboardComments')) || [];
        comments.forEach(addCommentToDOM);
    }

    function addCommentToDOM(comment) {
        const div = document.createElement('div');
        div.className = 'comment-item';
        div.innerHTML = `<div>${comment.text}</div><div class="comment-time">${comment.time}</div>`;
        commentsList.appendChild(div);
    }
</script>
</body>
</html>
