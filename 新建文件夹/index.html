<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图片评论板</title>
  <style>
    /* 全局重置，避免默认样式干扰 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden; /* 防止页面出现滚动条 */
    }

    /* 背景容器：固定铺满整个屏幕 */
    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    /* 背景图片：自适应铺满容器，不变形 */
    .bg-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 评论区：右下角悬浮面板 */
    .comment-panel {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 340px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      z-index: 99;
    }

    .comment-panel h3 {
      color: #fff;
      text-align: center;
      margin-bottom: 12px;
    }

    #comment-input {
      width: 100%;
      height: 80px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      resize: none;
      margin-bottom: 10px;
    }

    #post-btn {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #comment-list {
      margin-top: 15px;
      max-height: 300px;
      overflow-y: auto;
    }

    .comment-item {
      background: rgba(255, 255, 255, 0.3);
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <!-- 背景区域：结构清晰，和样式一一对应 -->
  <div class="bg-container">
    <!-- src 是图片路径，alt 是图片加载失败时的提示文字，不需要定义 -->
    <img src="./IMG_2185.PNG" alt="背景图片">
  </div>

  <!-- 评论区 -->
  <div class="comment-panel">
    <h3>留言评论</h3>
    <textarea id="comment-input" placeholder="输入评论..."></textarea>
    <button id="post-btn">发布评论</button>
    <div id="comment-list"></div>
  </div>

  <script>
    const input = document.getElementById('comment-input');
    const btn = document.getElementById('post-btn');
    const list = document.getElementById('comment-list');

    btn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;
      
      const item = document.createElement('div');
      item.className = 'comment-item';
      item.textContent = text;
      list.appendChild(item);
      
      input.value = '';
    });
  </script>
</body>
</html>
